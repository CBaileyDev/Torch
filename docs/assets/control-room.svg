<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="700" viewBox="0 0 1280 700" role="img" aria-label="Torch Control Room mid-run: pipeline rail with five stage cards, critics streaming, output pane and usage footer" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <radialGradient id="glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/>
    </radialGradient>
    <g id="flame">
      <path fill="#E8A33D" d="M32 5 C40 13 45.5 21 44 29.5 C42.5 37.5 37 41 32 41 C27 41 21.5 37.5 20 29.5 C18.5 21 24 13 32 5 Z"/>
      <path fill="#F2C063" d="M32 14 C37 19.5 40 24.5 39 29.8 C38 34.8 35 37.5 32 37.5 C29 37.5 26 34.8 25 29.8 C24 24.5 27 19.5 32 14 Z"/>
      <path fill="#FBE9C0" d="M32 22 C34.8 25.2 36.3 28 35.6 31 C35 33.8 33.6 35.2 32 35.2 C30.4 35.2 29 33.8 28.4 31 C27.7 28 29.2 25.2 32 22 Z"/>
    </g>
    <g id="stick">
      <rect x="26.6" y="39" width="10.8" height="9.5" rx="2" fill="#3A3128"/>
      <rect x="26.6" y="42.6" width="10.8" height="1.4" fill="#2A231C"/>
      <path d="M29.4 48.5 L34.6 48.5 L33.2 88 C33.2 89.3 30.8 89.3 30.8 88 Z" fill="#4A3A28"/>
    </g>
    <g id="char">
      <path fill="#221C16" d="M27 36 L29 32.5 L31 35 L33 31.8 L35 34.6 L37 36 L37 40 L27 40 Z"/>
      <circle cx="33.4" cy="36.8" r="1.5" fill="#D9824A"/>
    </g>
  </defs>

  <!-- window -->
  <rect x="1" y="1" width="1278" height="698" rx="12" fill="#121315" stroke="#202327" stroke-width="2"/>

  <!-- titlebar -->
  <circle cx="28" cy="23" r="6" fill="#3A3D42"/>
  <circle cx="48" cy="23" r="6" fill="#3A3D42"/>
  <circle cx="68" cy="23" r="6" fill="#3A3D42"/>
  <text x="640" y="27" text-anchor="middle" font-size="11" letter-spacing="5" fill="#9BA1A8">TORCH</text>
  <line x1="1" y1="44" x2="1279" y2="44" stroke="#202327"/>

  <!-- sidebar -->
  <path d="M1 44 H233 V699 H13 A12 12 0 0 1 1 687 Z" fill="#0C0D0E"/>
  <line x1="233" y1="44" x2="233" y2="699" stroke="#202327"/>
  <text x="20" y="80" font-size="10" letter-spacing="2" fill="#70767D">RUNS</text>

  <rect x="12" y="94" width="209" height="58" rx="7" fill="#1E1C16" stroke="#80581F"/>
  <text x="24" y="117" font-size="12" fill="#F0F2F4">Markdown vault sync CLI</text>
  <circle cx="28" cy="135" r="3.5" fill="#E8A33D"/>
  <text x="38" y="139" font-size="10" fill="#9BA1A8">running &#183; 4:12</text>

  <rect x="12" y="162" width="209" height="54" rx="7" fill="none" stroke="#25282C"/>
  <text x="24" y="184" font-size="12" fill="#D6D9DD">ProjectPacker schema v2</text>
  <circle cx="28" cy="201" r="3.5" fill="#6FA86F"/>
  <text x="38" y="205" font-size="10" fill="#70767D">green &#183; 38 turns</text>

  <rect x="12" y="226" width="209" height="54" rx="7" fill="none" stroke="#25282C"/>
  <text x="24" y="248" font-size="12" fill="#D6D9DD">Blackboard migration</text>
  <circle cx="28" cy="265" r="3.5" fill="#C25E5E"/>
  <text x="38" y="269" font-size="10" fill="#70767D">failed &#183; 11 turns</text>

  <text x="20" y="686" font-size="9.5" fill="#70767D">torch v0.1.0 &#183; demo mode</text>

  <!-- prompt bar -->
  <rect x="256" y="64" width="850" height="44" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="272" y="91" font-size="13" fill="#D6D9DD">Build a Markdown vault sync CLI with conflict resolution</text>
  <rect x="1116" y="64" width="90" height="44" rx="8" fill="none" stroke="#2D3136"/>
  <text x="1161" y="90" text-anchor="middle" font-size="11" fill="#9BA1A8">Cancel run</text>
  <rect x="1212" y="64" width="44" height="44" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="1234" y="92" text-anchor="middle" font-size="17" fill="#9BA1A8">&#9881;</text>

  <!-- meta row -->
  <text x="256" y="136" font-size="11" fill="#70767D">dir <tspan fill="#C2C7CD">~/dev/vault-sync</tspan>&#160;&#160;&#160;&#160;preset <tspan fill="#C2C7CD">standard</tspan>&#160;&#160;&#160;&#160;plan <tspan fill="#C2C7CD">max20x</tspan>&#160;&#160;&#160;&#160;elapsed <tspan fill="#C2C7CD">4:12</tspan></text>

  <!-- ===== pipeline rail ===== -->
  <!-- 1 INTAKE — spent -->
  <rect x="256" y="156" width="175" height="128" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="269" y="178" font-size="10.5" letter-spacing="1.5" fill="#9BA1A8">INTAKE</text>
  <g transform="translate(388,164) scale(0.34)"><use href="#char"/><use href="#stick"/></g>
  <rect x="269" y="190" width="50" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="294" y="203" text-anchor="middle" font-size="10" fill="#C2C7CD">sonnet</text>
  <text x="326" y="203" font-size="9.5" fill="#70767D">low</text>
  <text x="269" y="268" font-size="10" fill="#70767D">done</text>
  <text x="418" y="268" text-anchor="end" font-size="10" fill="#70767D">0:18</text>

  <!-- 2 PLAN — spent -->
  <rect x="441" y="156" width="175" height="128" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="454" y="178" font-size="10.5" letter-spacing="1.5" fill="#9BA1A8">PLAN</text>
  <g transform="translate(573,164) scale(0.34)"><use href="#char"/><use href="#stick"/></g>
  <rect x="454" y="190" width="44" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="476" y="203" text-anchor="middle" font-size="10" fill="#C2C7CD">fable</text>
  <text x="505" y="203" font-size="9.5" fill="#70767D">max</text>
  <text x="454" y="268" font-size="10" fill="#70767D">done</text>
  <text x="603" y="268" text-anchor="end" font-size="10" fill="#70767D">1:42</text>

  <!-- 3 CRITICS — lit -->
  <rect x="626" y="156" width="227" height="128" rx="8" fill="#1E1C16" stroke="#80581F" stroke-width="1.5"/>
  <text x="639" y="178" font-size="10.5" letter-spacing="1.5" fill="#F0F2F4">CRITICS</text>
  <g transform="translate(810,162) scale(0.34)">
    <circle cx="32" cy="26" r="22" fill="url(#glow)"/>
    <use href="#flame"/><use href="#stick"/>
  </g>
  <!-- critic a -->
  <rect x="639" y="190" width="40" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="659" y="203" text-anchor="middle" font-size="10" fill="#C2C7CD">opus</text>
  <text x="686" y="203" font-size="9.5" fill="#70767D">high</text>
  <g fill="#E8A33D">
    <rect x="722" y="196" width="3" height="8" rx="1"/><rect x="728" y="193" width="3" height="11" rx="1"/>
    <rect x="734" y="198" width="3" height="6" rx="1"/><rect x="740" y="191" width="3" height="13" rx="1"/>
    <rect x="746" y="195" width="3" height="9" rx="1"/>
  </g>
  <!-- critic b -->
  <rect x="639" y="216" width="44" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="661" y="229" text-anchor="middle" font-size="10" fill="#C2C7CD">fable</text>
  <text x="690" y="229" font-size="9.5" fill="#70767D">high</text>
  <g fill="#E8A33D">
    <rect x="722" y="223" width="3" height="7" rx="1"/><rect x="728" y="220" width="3" height="10" rx="1"/>
    <rect x="734" y="218" width="3" height="12" rx="1"/><rect x="740" y="224" width="3" height="6" rx="1"/>
    <rect x="746" y="221" width="3" height="9" rx="1"/>
  </g>
  <text x="639" y="268" font-size="10" fill="#E8A33D">streaming&#8230;</text>
  <text x="840" y="268" text-anchor="end" font-size="10" fill="#70767D">0:47</text>

  <!-- 4 IMPLEMENT — unlit -->
  <rect x="863" y="156" width="175" height="128" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="876" y="178" font-size="10.5" letter-spacing="1.5" fill="#9BA1A8">IMPLEMENT</text>
  <g transform="translate(995,164) scale(0.34)" opacity="0.55"><use href="#stick"/></g>
  <rect x="876" y="190" width="50" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="901" y="203" text-anchor="middle" font-size="10" fill="#C2C7CD">sonnet</text>
  <text x="933" y="203" font-size="9.5" fill="#70767D">medium</text>
  <text x="876" y="268" font-size="10" fill="#70767D">queued</text>
  <text x="1025" y="268" text-anchor="end" font-size="10" fill="#70767D">&#8212;</text>

  <!-- 5 VERIFY ⇄ REFINE — unlit -->
  <rect x="1048" y="156" width="208" height="128" rx="8" fill="#191B1E" stroke="#25282C"/>
  <text x="1061" y="178" font-size="10.5" letter-spacing="1.5" fill="#9BA1A8">VERIFY &#8646; REFINE</text>
  <g transform="translate(1213,164) scale(0.34)" opacity="0.55"><use href="#stick"/></g>
  <rect x="1061" y="190" width="50" height="19" rx="4" fill="#1F2226" stroke="#2D3136"/>
  <text x="1086" y="203" text-anchor="middle" font-size="10" fill="#C2C7CD">sonnet</text>
  <text x="1118" y="203" font-size="9.5" fill="#70767D">medium</text>
  <text x="1061" y="268" font-size="10" fill="#70767D">iter 0/5</text>
  <text x="1243" y="268" text-anchor="end" font-size="10" fill="#70767D">&#8212;</text>

  <!-- output pane -->
  <rect x="256" y="300" width="1000" height="330" rx="8" fill="#0C0D0E" stroke="#25282C"/>
  <rect x="272" y="314" width="78" height="22" rx="5" fill="#1E1C16" stroke="#80581F"/>
  <text x="311" y="329" text-anchor="middle" font-size="10" fill="#E8A33D">critic-a</text>
  <rect x="358" y="314" width="78" height="22" rx="5" fill="#1F2226" stroke="#2D3136"/>
  <text x="397" y="329" text-anchor="middle" font-size="10" fill="#70767D">critic-b</text>
  <text x="1240" y="329" text-anchor="end" font-size="10" fill="#70767D">opus &#183; high &#183; fresh session</text>
  <line x1="256" y1="348" x2="1256" y2="348" stroke="#1B1D20"/>

  <g font-size="12.5" fill="#D6D9DD">
    <text x="272" y="380"><tspan fill="#E8A33D">F1.</tspan> The plan should move core data-model implementation before CLI</text>
    <text x="272" y="402">    scaffolding &#8212; dependent work is blocked otherwise.</text>
    <text x="272" y="432"><tspan fill="#E8A33D">F2.</tspan> Missing error-propagation strategy across crate boundaries;</text>
    <text x="272" y="454">    recommend a thiserror + anyhow hierarchy.</text>
    <text x="272" y="484"><tspan fill="#E8A33D">F3.</tspan> CI matrix should pin the toolchain version to avoid nightly</text>
    <text x="272" y="506">    regressions.</text>
  </g>
  <rect x="272" y="524" width="8" height="16" fill="#E8A33D"/>

  <!-- usage footer -->
  <rect x="256" y="646" width="1000" height="38" rx="8" fill="#191B1E" stroke="#25282C"/>
  <g font-size="10.5" fill="#70767D">
    <text x="272" y="670">session <tspan fill="#C2C7CD">7c2f&#8230;main</tspan></text>
    <text x="450" y="670">turns <tspan fill="#C2C7CD">14</tspan></text>
    <text x="560" y="670">in <tspan fill="#C2C7CD">4.9k</tspan></text>
    <text x="660" y="670">out <tspan fill="#C2C7CD">1.4k</tspan></text>
    <text x="765" y="670">cache read <tspan fill="#C2C7CD">12.3k</tspan></text>
    <text x="1240" y="670" text-anchor="end">tier <tspan fill="#E8A33D">max20x</tspan></text>
  </g>
</svg>
