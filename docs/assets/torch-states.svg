<svg xmlns="http://www.w3.org/2000/svg" width="880" height="230" viewBox="0 0 880 230" role="img" aria-label="The four torch states: unlit means queued, lit means running, spent means done, guttered means failed" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <rect x="1" y="1" width="878" height="228" rx="12" fill="#121315" stroke="#202327" stroke-width="2"/>

  <defs>
    <radialGradient id="g-amber" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g-red" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#C25E5E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#C25E5E" stop-opacity="0"/>
    </radialGradient>
    <g id="ts-stick">
      <rect x="26.6" y="39" width="10.8" height="9.5" rx="2" fill="#3A3128"/>
      <rect x="26.6" y="42.6" width="10.8" height="1.4" fill="#2A231C"/>
      <path d="M29.4 48.5 L34.6 48.5 L33.2 88 C33.2 89.3 30.8 89.3 30.8 88 Z" fill="#4A3A28"/>
    </g>
  </defs>

  <!-- UNLIT -->
  <g transform="translate(78,26) scale(1.15)" opacity="0.5">
    <use href="#ts-stick"/>
  </g>
  <text x="115" y="174" text-anchor="middle" font-size="12" letter-spacing="2" fill="#F0F2F4">UNLIT</text>
  <text x="115" y="196" text-anchor="middle" font-size="10.5" fill="#70767D">queued</text>

  <!-- LIT -->
  <g transform="translate(298,26) scale(1.15)">
    <circle cx="32" cy="26" r="22" fill="url(#g-amber)"/>
    <path fill="#E8A33D" d="M32 5 C40 13 45.5 21 44 29.5 C42.5 37.5 37 41 32 41 C27 41 21.5 37.5 20 29.5 C18.5 21 24 13 32 5 Z"/>
    <path fill="#F2C063" d="M32 14 C37 19.5 40 24.5 39 29.8 C38 34.8 35 37.5 32 37.5 C29 37.5 26 34.8 25 29.8 C24 24.5 27 19.5 32 14 Z"/>
    <path fill="#FBE9C0" d="M32 22 C34.8 25.2 36.3 28 35.6 31 C35 33.8 33.6 35.2 32 35.2 C30.4 35.2 29 33.8 28.4 31 C27.7 28 29.2 25.2 32 22 Z"/>
    <use href="#ts-stick"/>
  </g>
  <text x="335" y="174" text-anchor="middle" font-size="12" letter-spacing="2" fill="#E8A33D">LIT</text>
  <text x="335" y="196" text-anchor="middle" font-size="10.5" fill="#70767D">running</text>

  <!-- SPENT -->
  <g transform="translate(518,26) scale(1.15)">
    <path fill="#221C16" d="M27 36 L29 32.5 L31 35 L33 31.8 L35 34.6 L37 36 L37 40 L27 40 Z"/>
    <circle cx="33.4" cy="36.8" r="1.5" fill="#D9824A"/>
    <use href="#ts-stick"/>
  </g>
  <text x="555" y="174" text-anchor="middle" font-size="12" letter-spacing="2" fill="#F0F2F4">SPENT</text>
  <text x="555" y="196" text-anchor="middle" font-size="10.5" fill="#70767D">done</text>

  <!-- GUTTERED -->
  <g transform="translate(738,26) scale(1.15)">
    <circle cx="32" cy="34" r="14" fill="url(#g-red)"/>
    <path fill="#221C16" d="M27 36 L29 32.5 L31 35 L33 31.8 L35 34.6 L37 36 L37 40 L27 40 Z"/>
    <circle cx="32.5" cy="36.5" r="2" fill="#C25E5E"/>
    <use href="#ts-stick"/>
  </g>
  <text x="775" y="174" text-anchor="middle" font-size="12" letter-spacing="2" fill="#C25E5E">GUTTERED</text>
  <text x="775" y="196" text-anchor="middle" font-size="10.5" fill="#70767D">failed</text>
</svg>
