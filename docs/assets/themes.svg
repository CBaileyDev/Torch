<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="172" viewBox="0 0 1200 172" role="img" aria-label="The four Torch themes: Coal, Pitch, Iron and Ember — the flame palette is identical in all of them" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', Menlo, Consolas, monospace">
  <defs>
    <radialGradient id="th-glow" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/>
    </radialGradient>
    <g id="th-flame">
      <path fill="#E8A33D" d="M32 5 C40 13 45.5 21 44 29.5 C42.5 37.5 37 41 32 41 C27 41 21.5 37.5 20 29.5 C18.5 21 24 13 32 5 Z"/>
      <path fill="#F2C063" d="M32 14 C37 19.5 40 24.5 39 29.8 C38 34.8 35 37.5 32 37.5 C29 37.5 26 34.8 25 29.8 C24 24.5 27 19.5 32 14 Z"/>
      <path fill="#FBE9C0" d="M32 22 C34.8 25.2 36.3 28 35.6 31 C35 33.8 33.6 35.2 32 35.2 C30.4 35.2 29 33.8 28.4 31 C27.7 28 29.2 25.2 32 22 Z"/>
    </g>
  </defs>

  <!-- COAL -->
  <rect x="20" y="14" width="272" height="144" rx="10" fill="#121315" stroke="#25282C" stroke-width="1.5"/>
  <text x="38" y="44" font-size="11" letter-spacing="2" fill="#F0F2F4">COAL</text>
  <text x="38" y="62" font-size="9.5" fill="#9BA1A8">default &#183; neutral grey-black</text>
  <rect x="38" y="76" width="158" height="60" rx="6" fill="#191B1E" stroke="#25282C"/>
  <rect x="50" y="90" width="100" height="6" rx="3" fill="#9BA1A8" opacity="0.35"/>
  <rect x="50" y="104" width="72" height="6" rx="3" fill="#9BA1A8" opacity="0.2"/>
  <rect x="50" y="118" width="44" height="10" rx="3" fill="#1F2226" stroke="#2D3136"/>
  <circle cx="242" cy="100" r="26" fill="url(#th-glow)"/>
  <g transform="translate(226,82) scale(0.5)"><use href="#th-flame"/></g>

  <!-- PITCH -->
  <rect x="316" y="14" width="272" height="144" rx="10" fill="#141210" stroke="#2A251D" stroke-width="1.5"/>
  <text x="334" y="44" font-size="11" letter-spacing="2" fill="#EFE9DC">PITCH</text>
  <text x="334" y="62" font-size="9.5" fill="#9C9485">warm near-black</text>
  <rect x="334" y="76" width="158" height="60" rx="6" fill="#1A1714" stroke="#2A251D"/>
  <rect x="346" y="90" width="100" height="6" rx="3" fill="#9C9485" opacity="0.35"/>
  <rect x="346" y="104" width="72" height="6" rx="3" fill="#9C9485" opacity="0.2"/>
  <rect x="346" y="118" width="44" height="10" rx="3" fill="#231E16" stroke="#322B1F"/>
  <circle cx="538" cy="100" r="26" fill="url(#th-glow)"/>
  <g transform="translate(522,82) scale(0.5)"><use href="#th-flame"/></g>

  <!-- IRON -->
  <rect x="612" y="14" width="272" height="144" rx="10" fill="#15171A" stroke="#272B30" stroke-width="1.5"/>
  <text x="630" y="44" font-size="11" letter-spacing="2" fill="#EBEFF3">IRON</text>
  <text x="630" y="62" font-size="9.5" fill="#99A1AA">cool gunmetal</text>
  <rect x="630" y="76" width="158" height="60" rx="6" fill="#1A1D21" stroke="#272B30"/>
  <rect x="642" y="90" width="100" height="6" rx="3" fill="#99A1AA" opacity="0.35"/>
  <rect x="642" y="104" width="72" height="6" rx="3" fill="#99A1AA" opacity="0.2"/>
  <rect x="642" y="118" width="44" height="10" rx="3" fill="#1F2429" stroke="#2C3239"/>
  <circle cx="834" cy="100" r="26" fill="url(#th-glow)"/>
  <g transform="translate(818,82) scale(0.5)"><use href="#th-flame"/></g>

  <!-- EMBER -->
  <rect x="908" y="14" width="272" height="144" rx="10" fill="#171110" stroke="#33241F" stroke-width="1.5"/>
  <text x="926" y="44" font-size="11" letter-spacing="2" fill="#F1E7DA">EMBER</text>
  <text x="926" y="62" font-size="9.5" fill="#A4968A">fired clay</text>
  <rect x="926" y="76" width="158" height="60" rx="6" fill="#1E1513" stroke="#33241F"/>
  <rect x="938" y="90" width="100" height="6" rx="3" fill="#A4968A" opacity="0.35"/>
  <rect x="938" y="104" width="72" height="6" rx="3" fill="#A4968A" opacity="0.2"/>
  <rect x="938" y="118" width="44" height="10" rx="3" fill="#261A15" stroke="#372620"/>
  <circle cx="1130" cy="100" r="26" fill="url(#th-glow)"/>
  <g transform="translate(1114,82) scale(0.5)"><use href="#th-flame"/></g>
</svg>
